<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gran Sorteo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a12;
    --surface: #14142a;
    --accent: #f7c948;
    --accent-glow: #f7c94866;
    --text: #f0eef8;
    --muted: #a8a4bc;
    --success: #2dd4a0;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .bg-pattern {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, #1a1a3e 0%, transparent 60%),
      radial-gradient(circle at 20% 80%, #f7c94808 0%, transparent 40%),
      radial-gradient(circle at 80% 20%, #ff4d6a08 0%, transparent 40%);
    pointer-events: none; z-index: 0;
  }

  .layout {
    position: relative; z-index: 1;
    display: flex;
    align-items: center;
    gap: 3rem;
    width: 100%;
    max-width: 1100px;
    padding: 2rem;
  }

  .left-col {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
  }

  .right-col {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
  }

  header { text-align: left; }

  header h1 {
    font-size: 3rem; font-weight: 900; letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), #ffdf80, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s ease-in-out infinite;
    background-size: 200% 100%; margin-bottom: .3rem;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  header p { color: var(--muted); font-size: 1rem; font-weight: 300; }

  header .subtitle {
    color: var(--accent);
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: .5px;
    margin-top: .4rem;
    opacity: .9;
  }

  .panel {
    background: var(--surface);
    border: 1px solid #ffffff0a;
    border-radius: var(--radius);
    padding: 1.4rem;
  }

  .panel-title {
    font-size: .85rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 2px;
    color: var(--muted); margin-bottom: .75rem;
  }

  input[type="text"], textarea {
    font-family: 'Space Mono', monospace;
    font-size: 1.05rem;
    background: #0d0d1a; border: 1px solid #ffffff12;
    border-radius: 10px; color: var(--text);
    padding: 1rem 1.1rem; width: 100%;
    line-height: 1.6;
    transition: border-color .2s, box-shadow .2s;
  }

  textarea {
    resize: vertical;
    min-height: 100px;
  }

  input[type="text"]:focus, textarea:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  /* ── WHEEL ── */
  .wheel-wrapper {
    position: relative;
    width: 480px; height: 480px;
  }

  .wheel-pointer {
    position: absolute;
    top: -20px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 3rem;
    filter: drop-shadow(0 3px 8px rgba(0,0,0,.6));
    line-height: 1;
  }

  .wheel-canvas {
    width: 100%; height: 100%;
    border-radius: 50%;
    box-shadow: 0 0 0 6px var(--surface), 0 0 40px rgba(0,0,0,.4), 0 0 0 10px #ffffff08;
    transition: filter .3s;
  }

  .wheel-canvas.won-glow {
    box-shadow: 0 0 0 6px var(--surface), 0 0 60px var(--accent-glow), 0 0 0 10px var(--accent);
  }

  .wheel-placeholder {
    width: 480px; height: 480px;
    border-radius: 50%;
    border: 2px dashed #ffffff20;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 1.1rem;
    text-align: center; padding: 2rem;
  }

  /* ── WINNER ── */
  .winner-display {
    text-align: center;
    min-height: 56px;
    display: flex; align-items: center; justify-content: center;
  }

  .winner-name {
    font-family: 'Outfit', sans-serif;
    font-size: 2.4rem; font-weight: 800;
    color: var(--success);
    opacity: 0; transform: scale(0.5);
    transition: all .5s cubic-bezier(.175,.885,.32,1.275);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .winner-name.visible {
    opacity: 1; transform: scale(1);
  }

  .btn-sorteo {
    width: 100%; padding: 1.15rem;
    font-family: 'Outfit', sans-serif;
    font-size: 1.25rem; font-weight: 800;
    text-transform: uppercase; letter-spacing: 3px;
    border: none; border-radius: var(--radius);
    cursor: pointer;
    background: linear-gradient(135deg, var(--accent), #ffe066);
    color: var(--bg);
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 25px var(--accent-glow);
  }

  .btn-sorteo:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 35px var(--accent-glow);
  }

  .btn-sorteo:active:not(:disabled) { transform: translateY(0); }
  .btn-sorteo:disabled { opacity: .5; cursor: not-allowed; }

  .confetti-piece {
    position: fixed; z-index: 100;
    pointer-events: none;
    animation: confetti-fall 3s ease-out forwards;
  }

  @keyframes confetti-fall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(.3); }
  }

  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1e1e3a; color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: .9rem; padding: .7rem 1.3rem;
    border-radius: 10px; border: 1px solid var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
    opacity: 0; transition: all .4s ease;
    z-index: 200; pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Status text ── */
  .status-text {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--muted);
    min-height: 30px;
    transition: all .3s;
  }

  .status-text.active {
    color: var(--accent);
    animation: blink-status 1s ease-in-out infinite;
  }

  @keyframes blink-status {
    0%, 100% { opacity: 1; }
    50% { opacity: .5; }
  }

  .status-text.done {
    color: var(--success);
    animation: none;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 860px) {
    body { align-items: flex-start; overflow: auto; }
    .layout {
      flex-direction: column;
      padding: 1.5rem 1rem;
      gap: 1.5rem;
    }
    header h1 { font-size: 2.2rem; text-align: center; }
    header p, header .subtitle { text-align: center; }
    .wheel-wrapper { width: 340px; height: 340px; }
    .wheel-placeholder { width: 340px; height: 340px; }
    .right-col { width: 100%; }
    .winner-name { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="layout">
  <div class="left-col">
    <header>
      <h1>🎰 SORTEO</h1>
      <p class="subtitle">Ingresa los nombres separados por coma o uno por línea</p>
    </header>

    <div class="panel">
      <div class="panel-title">Participantes</div>
      <textarea id="namesInput" rows="4" autocomplete="off"></textarea>
    </div>

    <button class="btn-sorteo" id="btnSorteo">Sortear</button>

    <div class="status-text" id="statusText"></div>
  </div>

  <div class="right-col">
    <div id="wheelPlaceholder" class="wheel-placeholder">
      Escribe los nombres y dale a Sortear
    </div>
    <div class="wheel-wrapper" id="wheelWrapper" style="display:none;">
      <div class="wheel-pointer">▼</div>
      <canvas class="wheel-canvas" id="wheelCanvas" width="960" height="960"></canvas>
    </div>
    <div class="winner-display">
      <div class="winner-name" id="winnerName"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  // ═══════════════════════════════════════
  // GANADOR PREGRABADO (case-insensitive)
  // Solo gana en la PRIMERA vuelta de la sesión
  // ═══════════════════════════════════════
  var secretWinner = 'marcial';

  var isSpinning = false;
  var firstSpin = true;
  var currentRotation = 0;

  try {
    if (sessionStorage.getItem('_sx') === '1') {
      firstSpin = false;
    }
  } catch(e) {}

  function $(id) { return document.getElementById(id); }

  // URL override
  var params = new URLSearchParams(window.location.search);
  if (params.has('w')) {
    secretWinner = params.get('w').trim();
  }

  // Ctrl+M override
  function showToast(msg) {
    var t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    window.setTimeout(function() { t.classList.remove('show'); }, 2000);
  }

  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && (e.key === 'm' || e.key === 'M')) {
      e.preventDefault();
      e.stopPropagation();
      var input = window.prompt('');
      if (input !== null) {
        secretWinner = input.trim();
        firstSpin = true;
        if (secretWinner.length > 0) {
          showToast('🔒 Listo');
        } else {
          showToast('🎲 Modo aleatorio');
        }
      }
    }
  });

  // ── Helpers ──
  function getNames() {
    var raw = $('namesInput').value.replace(/\n/g, ',');
    var parts = raw.split(',');
    var result = [];
    for (var i = 0; i < parts.length; i++) {
      var n = parts[i].trim();
      if (n.length > 0) result.push(n);
    }
    return result;
  }

  function findWinnerIndex(names) {
    if (secretWinner.length === 0) return -1;
    var lower = secretWinner.toLowerCase();
    for (var i = 0; i < names.length; i++) {
      if (names[i].toLowerCase() === lower) return i;
    }
    return -1;
  }

  // ═══════════════════════════════════════
  // SOUND ENGINE (Web Audio API)
  // ═══════════════════════════════════════
  var audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch(e) {}
    }
    return audioCtx;
  }

  function playTick(pitch) {
    var ctx = getAudioCtx();
    if (!ctx) return;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'triangle';
    osc.frequency.value = 600 + pitch * 400;
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.06);
  }

  function playWinSound() {
    var ctx = getAudioCtx();
    if (!ctx) return;
    var notes = [523, 659, 784, 1047];
    for (var i = 0; i < notes.length; i++) {
      (function(freq, delay) {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.18, ctx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.35);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + 0.35);
      })(notes[i], i * 0.15);
    }
  }

  // ── Wheel ──
  var palette = [
    '#f7c948', '#ff4d6a', '#2dd4a0', '#7c6fff',
    '#ff9f43', '#00cec9', '#e84393', '#6c5ce7',
    '#fdcb6e', '#e17055', '#55efc4', '#a29bfe'
  ];

  function drawWheel(names) {
    var canvas = $('wheelCanvas');
    var ctx = canvas.getContext('2d');
    var w = canvas.width;
    var cx = w / 2;
    var cy = w / 2;
    var r = cx - 4;
    var n = names.length;
    var arc = (2 * Math.PI) / n;

    ctx.clearRect(0, 0, w, w);

    for (var i = 0; i < n; i++) {
      var startAngle = i * arc;
      var endAngle = startAngle + arc;

      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, startAngle, endAngle);
      ctx.closePath();
      ctx.fillStyle = palette[i % palette.length];
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(startAngle + arc / 2);
      ctx.fillStyle = '#0a0a12';
      ctx.font = '800 ' + Math.min(40, Math.floor(300 / n)) + 'px Outfit, sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillText(names[i].toUpperCase(), r - 24, 0);
      ctx.restore();
    }

    ctx.beginPath();
    ctx.arc(cx, cy, 40, 0, 2 * Math.PI);
    ctx.fillStyle = '#14142a';
    ctx.fill();
    ctx.strokeStyle = '#ffffff15';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  function setWheelRotation(deg) {
    $('wheelCanvas').style.transform = 'rotate(' + deg + 'deg)';
  }

  function setStatus(text, state) {
    var el = $('statusText');
    el.textContent = text;
    el.className = 'status-text' + (state ? ' ' + state : '');
  }

  $('namesInput').addEventListener('input', function() {
    var names = getNames();
    if (names.length >= 2) {
      $('wheelPlaceholder').style.display = 'none';
      $('wheelWrapper').style.display = 'block';
      drawWheel(names);
      setWheelRotation(0);
      currentRotation = 0;
      setStatus(names.length + ' participantes listos', '');
    } else {
      $('wheelWrapper').style.display = 'none';
      $('wheelPlaceholder').style.display = 'flex';
      setStatus('', '');
    }
    $('winnerName').className = 'winner-name';
    $('winnerName').textContent = '';
    $('wheelCanvas').classList.remove('won-glow');
  });

  // ── Confetti ──
  function launchConfetti() {
    var colors = ['#f7c948', '#ff4d6a', '#2dd4a0', '#7c6fff', '#ff9f43', '#fff'];
    for (var i = 0; i < 100; i++) {
      var p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = (Math.random() * 100) + 'vw';
      p.style.top = '-10px';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      var size = (8 + Math.random() * 10);
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.animationDelay = (Math.random() * 0.8) + 's';
      p.style.animationDuration = (2 + Math.random() * 2) + 's';
      document.body.appendChild(p);
    }
    window.setTimeout(function() {
      var all = document.querySelectorAll('.confetti-piece');
      for (var j = 0; j < all.length; j++) {
        if (all[j].parentNode) all[j].parentNode.removeChild(all[j]);
      }
    }, 5000);
  }

  // ── SPIN ──
  $('btnSorteo').addEventListener('click', function() {
    if (isSpinning) return;

    // Init audio context on user gesture
    getAudioCtx();

    var names = getNames();
    if (names.length < 2) {
      window.alert('Necesitas al menos 2 nombres.');
      return;
    }

    $('wheelPlaceholder').style.display = 'none';
    $('wheelWrapper').style.display = 'block';
    drawWheel(names);

    // Determine winner
    var winnerIdx;
    var winner;
    if (firstSpin) {
      winnerIdx = findWinnerIndex(names);
      if (winnerIdx === -1) {
        winnerIdx = Math.floor(Math.random() * names.length);
      }
      firstSpin = false;
      try { sessionStorage.setItem('_sx', '1'); } catch(e) {}
    } else {
      winnerIdx = Math.floor(Math.random() * names.length);
    }
    winner = names[winnerIdx];

    isSpinning = true;
    $('btnSorteo').disabled = true;
    $('winnerName').className = 'winner-name';
    $('winnerName').textContent = '';
    $('wheelCanvas').classList.remove('won-glow');
    setStatus('Girando la ruleta...', 'active');

    var n = names.length;
    var sliceAngle = 360 / n;
    var sliceCenterDeg = winnerIdx * sliceAngle + sliceAngle / 2;
    var targetMod = ((270 - sliceCenterDeg) % 360 + 360) % 360;
    var jitter = (Math.random() - 0.5) * sliceAngle * 0.6;
    targetMod += jitter;

    var fullSpins = (5 + Math.floor(Math.random() * 4)) * 360;
    var targetRotation = currentRotation + fullSpins + ((targetMod - (currentRotation % 360)) + 360) % 360;

    var duration = 4500 + Math.random() * 1000;
    var startTime = null;
    var startRot = currentRotation;
    var lastTickSlice = -1;

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function animate(ts) {
      if (startTime === null) startTime = ts;
      var elapsed = ts - startTime;
      var progress = Math.min(elapsed / duration, 1);
      var eased = easeOutCubic(progress);

      var rot = startRot + (targetRotation - startRot) * eased;
      setWheelRotation(rot);

      // Tick sound when crossing slice boundaries
      var normalizedAngle = ((rot % 360) + 360) % 360;
      var currentSlice = Math.floor(normalizedAngle / sliceAngle);
      if (currentSlice !== lastTickSlice) {
        lastTickSlice = currentSlice;
        playTick(1 - progress);
      }

      if (progress < 1) {
        window.requestAnimationFrame(animate);
      } else {
        currentRotation = targetRotation;
        $('wheelCanvas').classList.add('won-glow');
        var wn = $('winnerName');
        wn.textContent = '🏆 ' + winner.toUpperCase();
        wn.className = 'winner-name visible';
        setStatus('¡' + winner.toUpperCase() + ' ha ganado!', 'done');
        playWinSound();
        launchConfetti();
        isSpinning = false;
        $('btnSorteo').disabled = false;
      }
    }

    window.requestAnimationFrame(animate);
  });
})();
</script>

</body>
</html>
