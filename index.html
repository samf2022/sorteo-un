<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gran Sorteo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a12;
    --surface: #14142a;
    --accent: #f7c948;
    --accent-glow: #f7c94866;
    --text: #f0eef8;
    --muted: #a8a4bc;
    --success: #2dd4a0;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .bg-pattern {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, #1a1a3e 0%, transparent 60%),
      radial-gradient(circle at 20% 80%, #f7c94808 0%, transparent 40%),
      radial-gradient(circle at 80% 20%, #ff4d6a08 0%, transparent 40%);
    pointer-events: none; z-index: 0;
  }

  .layout {
    position: relative; z-index: 1;
    display: flex;
    align-items: center;
    gap: 3rem;
    width: 100%;
    max-width: 1100px;
    padding: 2rem;
  }

  .left-col {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
  }

  .right-col {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
  }

  header { text-align: left; }

  header h1 {
    font-size: 3rem; font-weight: 900; letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), #ffdf80, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s ease-in-out infinite;
    background-size: 200% 100%; margin-bottom: .3rem;
    user-select: none; -webkit-user-select: none;
    cursor: default;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  header p { color: var(--muted); font-size: 1rem; font-weight: 300; }

  header .subtitle {
    color: var(--accent);
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: .5px;
    margin-top: .4rem;
    opacity: .9;
  }

  .panel {
    background: var(--surface);
    border: 1px solid #ffffff0a;
    border-radius: var(--radius);
    padding: 1.4rem;
  }

  .panel-title {
    font-size: .85rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 2px;
    color: var(--muted); margin-bottom: .75rem;
  }

  input[type="text"], textarea {
    font-family: 'Space Mono', monospace;
    font-size: 1.05rem;
    background: #0d0d1a; border: 1px solid #ffffff12;
    border-radius: 10px; color: var(--text);
    padding: 1rem 1.1rem; width: 100%;
    line-height: 1.6;
    transition: border-color .2s, box-shadow .2s;
  }

  textarea {
    resize: vertical;
    min-height: 100px;
  }

  input[type="text"]:focus, textarea:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .wheel-wrapper {
    position: relative;
    width: 480px; height: 480px;
  }

  .wheel-pointer {
    position: absolute;
    top: -20px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 3rem;
    filter: drop-shadow(0 3px 8px rgba(0,0,0,.6));
    line-height: 1;
  }

  .wheel-canvas {
    width: 100%; height: 100%;
    border-radius: 50%;
    box-shadow: 0 0 0 6px var(--surface), 0 0 40px rgba(0,0,0,.4), 0 0 0 10px #ffffff08;
    transition: filter .3s;
  }

  .wheel-canvas.won-glow {
    box-shadow: 0 0 0 6px var(--surface), 0 0 60px var(--accent-glow), 0 0 0 10px var(--accent);
  }

  .wheel-placeholder {
    width: 480px; height: 480px;
    border-radius: 50%;
    border: 2px dashed #ffffff20;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 1.1rem;
    text-align: center; padding: 2rem;
  }

  .winner-display {
    text-align: center;
    min-height: 56px;
    display: flex; align-items: center; justify-content: center;
  }

  .winner-name {
    font-family: 'Outfit', sans-serif;
    font-size: 2.4rem; font-weight: 800;
    color: var(--success);
    opacity: 0; transform: scale(0.5);
    transition: all .5s cubic-bezier(.175,.885,.32,1.275);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .winner-name.visible {
    opacity: 1; transform: scale(1);
  }

  .btn-sorteo {
    width: 100%; padding: 1.15rem;
    font-family: 'Outfit', sans-serif;
    font-size: 1.25rem; font-weight: 800;
    text-transform: uppercase; letter-spacing: 3px;
    border: none; border-radius: var(--radius);
    cursor: pointer;
    background: linear-gradient(135deg, var(--accent), #ffe066);
    color: var(--bg);
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 25px var(--accent-glow);
  }

  .btn-sorteo:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 35px var(--accent-glow);
  }

  .btn-sorteo:active:not(:disabled) { transform: translateY(0); }
  .btn-sorteo:disabled { opacity: .5; cursor: not-allowed; }

  .confetti-piece {
    position: fixed; z-index: 100;
    pointer-events: none;
    animation: confetti-fall 3s ease-out forwards;
  }

  @keyframes confetti-fall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(.3); }
  }

  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1e1e3a; color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: .9rem; padding: .7rem 1.3rem;
    border-radius: 10px; border: 1px solid var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
    opacity: 0; transition: all .4s ease;
    z-index: 200; pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .status-text {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--muted);
    min-height: 30px;
    transition: all .3s;
  }

  .status-text.active {
    color: var(--accent);
    animation: blink-status 1s ease-in-out infinite;
  }

  @keyframes blink-status {
    0%, 100% { opacity: 1; }
    50% { opacity: .5; }
  }

  .status-text.done {
    color: var(--success);
    animation: none;
  }

  @media (max-width: 860px) {
    body { align-items: flex-start; overflow: auto; }
    .layout {
      flex-direction: column;
      padding: 1.5rem 1rem;
      gap: 1.5rem;
    }
    header h1 { font-size: 2.2rem; text-align: center; }
    header p, header .subtitle { text-align: center; }
    .wheel-wrapper { width: 340px; height: 340px; }
    .wheel-placeholder { width: 340px; height: 340px; }
    .right-col { width: 100%; }
    .winner-name { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="layout">
  <div class="left-col">
    <header>
      <h1 id="titleArea">🎰 SORTEO</h1>
      <p class="subtitle">Ingresa los nombres separados por coma o uno por línea</p>
    </header>

    <div class="panel">
      <div class="panel-title">Participantes</div>
      <textarea id="namesInput" rows="4" autocomplete="off"></textarea>
    </div>

    <button class="btn-sorteo" id="btnSorteo">Sortear</button>

    <div class="status-text" id="statusText"></div>
  </div>

  <div class="right-col">
    <div id="wheelPlaceholder" class="wheel-placeholder">
      Escribe los nombres y dale a Sortear
    </div>
    <div class="wheel-wrapper" id="wheelWrapper" style="display:none;">
      <div class="wheel-pointer">▼</div>
      <canvas class="wheel-canvas" id="wheelCanvas" width="960" height="960"></canvas>
    </div>
    <div class="winner-display">
      <div class="winner-name" id="winnerName"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  var _q = '';
  var _r = false;
  var _k = true;
  var _v = 0;

  try {
    if (sessionStorage.getItem('_sx') === '1') {
      _k = false;
    }
  } catch(e) {}

  function $(id) { return document.getElementById(id); }

  var _p = new URLSearchParams(window.location.search);
  if (_p.has('w')) {
    _q = _p.get('w').trim();
    if (_q.length > 0) _k = true;
  }

  function _t(msg) {
    var t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    window.setTimeout(function() { t.classList.remove('show'); }, 2000);
  }

  function _h(v) {
    if (v !== null) {
      _q = v.trim();
      _k = true;
      _t(_q.length > 0 ? '\u{1F512} Listo' : '\u{1F3B2} Modo aleatorio');
    }
  }

  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && (e.key === 'm' || e.key === 'M')) {
      e.preventDefault();
      e.stopPropagation();
      _h(window.prompt(''));
    }
  });

  var _lt = null;
  var _te = $('titleArea');

  _te.addEventListener('touchstart', function(e) {
    _lt = window.setTimeout(function() {
      _lt = null;
      _h(window.prompt(''));
    }, 3000);
  }, { passive: true });

  _te.addEventListener('touchend', function() {
    if (_lt) { window.clearTimeout(_lt); _lt = null; }
  });

  _te.addEventListener('touchmove', function() {
    if (_lt) { window.clearTimeout(_lt); _lt = null; }
  });

  function _gn() {
    var raw = $('namesInput').value.replace(/\n/g, ',');
    var parts = raw.split(',');
    var result = [];
    for (var i = 0; i < parts.length; i++) {
      var n = parts[i].trim();
      if (n.length > 0) result.push(n);
    }
    return result;
  }

  function _rw(names, cb) {
    var body = { n: names };
    if (_k && _q.length > 0) {
      body.s = btoa(unescape(encodeURIComponent(_q)));
      body.f = true;
    }
    fetch('/api/spin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
    .then(function(r) {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    })
    .then(function(d) {
      if (typeof d.i === 'number' && d.i >= 0 && d.i < names.length) {
        cb(d.i);
      } else {
        cb(Math.floor(Math.random() * names.length));
      }
    })
    .catch(function() { cb(Math.floor(Math.random() * names.length)); });
  }

  var _ac = null;

  function _ga() {
    if (!_ac) {
      try {
        _ac = new (window.AudioContext || window.webkitAudioContext)();
      } catch(e) {}
    }
    return _ac;
  }

  function _pt(pitch) {
    var ctx = _ga();
    if (!ctx) return;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'triangle';
    osc.frequency.value = 600 + pitch * 400;
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.06);
  }

  function _pw() {
    var ctx = _ga();
    if (!ctx) return;
    var notes = [523, 659, 784, 1047];
    for (var i = 0; i < notes.length; i++) {
      (function(freq, delay) {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.18, ctx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.35);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + 0.35);
      })(notes[i], i * 0.15);
    }
  }

  var _cl = [
    '#f7c948', '#ff4d6a', '#2dd4a0', '#7c6fff',
    '#ff9f43', '#00cec9', '#e84393', '#6c5ce7',
    '#fdcb6e', '#e17055', '#55efc4', '#a29bfe'
  ];

  function _dw(names) {
    var canvas = $('wheelCanvas');
    var ctx = canvas.getContext('2d');
    var w = canvas.width;
    var cx = w / 2;
    var cy = w / 2;
    var r = cx - 4;
    var n = names.length;
    var arc = (2 * Math.PI) / n;

    ctx.clearRect(0, 0, w, w);

    for (var i = 0; i < n; i++) {
      var sa = i * arc;
      var ea = sa + arc;

      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, sa, ea);
      ctx.closePath();
      ctx.fillStyle = _cl[i % _cl.length];
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(sa + arc / 2);
      ctx.fillStyle = '#0a0a12';
      ctx.font = '800 ' + Math.min(40, Math.floor(300 / n)) + 'px Outfit, sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillText(names[i].toUpperCase(), r - 24, 0);
      ctx.restore();
    }

    ctx.beginPath();
    ctx.arc(cx, cy, 40, 0, 2 * Math.PI);
    ctx.fillStyle = '#14142a';
    ctx.fill();
    ctx.strokeStyle = '#ffffff15';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  function _sr(deg) {
    $('wheelCanvas').style.transform = 'rotate(' + deg + 'deg)';
  }

  function _ss(text, state) {
    var el = $('statusText');
    el.textContent = text;
    el.className = 'status-text' + (state ? ' ' + state : '');
  }

  $('namesInput').addEventListener('input', function() {
    var names = _gn();
    if (names.length >= 2) {
      $('wheelPlaceholder').style.display = 'none';
      $('wheelWrapper').style.display = 'block';
      _dw(names);
      _sr(0);
      _v = 0;
      _ss(names.length + ' participantes listos', '');
    } else {
      $('wheelWrapper').style.display = 'none';
      $('wheelPlaceholder').style.display = 'flex';
      _ss('', '');
    }
    $('winnerName').className = 'winner-name';
    $('winnerName').textContent = '';
    $('wheelCanvas').classList.remove('won-glow');
  });

  function _lc() {
    var colors = ['#f7c948', '#ff4d6a', '#2dd4a0', '#7c6fff', '#ff9f43', '#fff'];
    for (var i = 0; i < 100; i++) {
      var p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = (Math.random() * 100) + 'vw';
      p.style.top = '-10px';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      var size = (8 + Math.random() * 10);
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.animationDelay = (Math.random() * 0.8) + 's';
      p.style.animationDuration = (2 + Math.random() * 2) + 's';
      document.body.appendChild(p);
    }
    window.setTimeout(function() {
      var all = document.querySelectorAll('.confetti-piece');
      for (var j = 0; j < all.length; j++) {
        if (all[j].parentNode) all[j].parentNode.removeChild(all[j]);
      }
    }, 5000);
  }

  $('btnSorteo').addEventListener('click', function() {
    if (_r) return;

    _ga();

    var names = _gn();
    if (names.length < 2) {
      window.alert('Necesitas al menos 2 nombres.');
      return;
    }

    _r = true;
    $('btnSorteo').disabled = true;
    $('winnerName').className = 'winner-name';
    $('winnerName').textContent = '';
    $('wheelCanvas').classList.remove('won-glow');
    $('wheelPlaceholder').style.display = 'none';
    $('wheelWrapper').style.display = 'block';
    _dw(names);
    _ss('Girando la ruleta...', 'active');

    _rw(names, function(wi) {
      _k = false;
      try { sessionStorage.setItem('_sx', '1'); } catch(e) {}
      var winner = names[wi];

      var n = names.length;
      var sa = 360 / n;
      var sc = wi * sa + sa / 2;
      var tm = ((270 - sc) % 360 + 360) % 360;
      var jt = (Math.random() - 0.5) * sa * 0.6;
      tm += jt;

      var fs = (5 + Math.floor(Math.random() * 4)) * 360;
      var tr = _v + fs + ((tm - (_v % 360)) + 360) % 360;

      var dur = 4500 + Math.random() * 1000;
      var st = null;
      var sr = _v;
      var ls = -1;

      function _eo(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      function _an(ts) {
        if (st === null) st = ts;
        var el = ts - st;
        var pg = Math.min(el / dur, 1);
        var ea = _eo(pg);

        var rot = sr + (tr - sr) * ea;
        _sr(rot);

        var na = ((rot % 360) + 360) % 360;
        var cs = Math.floor(na / sa);
        if (cs !== ls) {
          ls = cs;
          _pt(1 - pg);
        }

        if (pg < 1) {
          window.requestAnimationFrame(_an);
        } else {
          _v = tr;
          $('wheelCanvas').classList.add('won-glow');
          var wn = $('winnerName');
          wn.textContent = '\u{1F3C6} ' + winner.toUpperCase();
          wn.className = 'winner-name visible';
          _ss('\u{00A1}' + winner.toUpperCase() + ' ha ganado!', 'done');
          _pw();
          _lc();
          _r = false;
          $('btnSorteo').disabled = false;
        }
      }

      window.requestAnimationFrame(_an);
    });
  });
})();
</script>

</body>
</html>
